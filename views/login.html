<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dang's Beach Resort</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
    <div id="header-container"></div>

    <main class="auth-main">
        <div class="form-card animate-fade-in">
            <div class="auth-header">
                <h3>Welcome Back</h3>
                <p>Please enter your credentials to access your account.</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full-width">Sign In</button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="/register">Create one now</a></p>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script>
        fetch('/header.html').then(res => res.text()).then(html => document.getElementById('header-container').innerHTML = html);
        fetch('/footer.html').then(res => res.text()).then(html => document.getElementById('footer-container').innerHTML = html);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            if (res.ok) {
                if (data.role === 'admin') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/dashboard';
                }
            } else {
                alert(data.message);
            }
        });
    </script>
</body>
</html>
