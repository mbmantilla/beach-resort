<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | Dang's Beach Resort</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
    <div id="header-container"></div>

    <main class="auth-main">
        <div class="form-card animate-fade-in">
            <div class="auth-header">
                <h3>Create Account</h3>
                <p>Join us for an unforgettable luxury experience.</p>
            </div>
            
            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullname" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Min. 8 characters" required>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="mobile" class="form-control" placeholder="09XXXXXXXXX">
                </div>
                <div class="form-group">
                    <label>Home Address</label>
                    <input type="text" id="address" class="form-control" placeholder="Your current address">
                </div>
                <button type="submit" class="btn btn-primary btn-full-width">Register Now</button>
            </form>
            
            <div class="auth-footer">
                <p>Already a member? <a href="/login">Sign in instead</a></p>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script>
        fetch('/header.html').then(res => res.text()).then(html => document.getElementById('header-container').innerHTML = html);
        fetch('/footer.html').then(res => res.text()).then(html => document.getElementById('footer-container').innerHTML = html);

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const mobile = document.getElementById('mobile').value;
            const address = document.getElementById('address').value;

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullname, email, password, mobile, address })
            });

            const data = await res.json();
            if (res.ok) {
                alert('Registration successful! Please login.');
                window.location.href = '/login';
            } else {
                alert(data.message);
            }
        });
    </script>
</body>
</html>
